services:
  - type: web
    name: lets-learn-constitution
    env: docker
    region: oregon
    plan: free
    healthCheckPath: /
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PGHOST
        fromDatabase:
          name: constitution-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: constitution-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: constitution-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: constitution-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: constitution-db
          property: password
      - key: JWT_SECRET
        value: constitution-app-jwt-secret-key-that-is-at-least-256-bits-long-for-hmac-sha-security

databases:
  - name: constitution-db
    region: oregon
    plan: free
    databaseName: constitution
    user: constitution_user
