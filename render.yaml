services:
  - type: web
    name: lets-learn-constitution
    runtime: java
    region: oregon
    buildCommand: cd backend && chmod +x mvnw && ./mvnw clean package -DskipTests
    startCommand: cd backend && java -jar target/backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PGHOST
        fromDatabase:
          name: constitution-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: constitution-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: constitution-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: constitution-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: constitution-db
          property: password
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: constitution-db
    region: oregon
    plan: free
    databaseName: constitution
    user: constitution_user
