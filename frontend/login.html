<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's Learn Constitution - Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#eef4ff,#dfefff);
    overflow:hidden;
}

/* Background Decorative Boxes */

body::before{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:#0b4db8;
    opacity:.08;
    border-radius:30px;
    top:-100px;
    left:-100px;
    transform:rotate(25deg);
}

body::after{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:#0b4db8;
    opacity:.08;
    border-radius:30px;
    bottom:-100px;
    right:-100px;
    transform:rotate(-25deg);
}

.container{
    width:100%;
    max-width:500px;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,0.12);
}

/* Logo */

.logo{
    text-align:center;
    margin-bottom:15px;
}

.logo i{
    font-size:70px;
    color:#0b4db8;
}

.title{
    text-align:center;
    color:#0b2d6b;
    font-size:30px;
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-top:8px;
    margin-bottom:30px;
}

h2{
    text-align:center;
    color:#0b2d6b;
    margin-bottom:8px;
}

.small{
    text-align:center;
    color:#777;
    margin-bottom:25px;
}

/* Inputs */

label{
    display:block;
    margin-bottom:8px;
    margin-top:15px;
    font-weight:600;
    color:#333;
}

.input-box{
    display:flex;
    align-items:center;
    border:1px solid #d7d7d7;
    border-radius:10px;
    padding:12px;
}

.input-box i{
    color:#666;
}

.input-box input{
    width:100%;
    border:none;
    outline:none;
    padding-left:10px;
    font-size:15px;
}

/* Remember */

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:15px;
    font-size:14px;
}

.options a{
    text-decoration:none;
    color:#0b4db8;
    font-weight:600;
}

/* Login Button */

.login-btn{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#0b4db8;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    background:#083c8f;
}

/* Divider */

.divider{
    text-align:center;
    margin:20px 0;
    color:#777;
    position:relative;
}

.divider::before{
    content:"";
    position:absolute;
    width:40%;
    height:1px;
    background:#ccc;
    left:0;
    top:50%;
}

.divider::after{
    content:"";
    position:absolute;
    width:40%;
    height:1px;
    background:#ccc;
    right:0;
    top:50%;
}

/* Google Button */

.google-btn{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    background:white;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
}

.google-btn i{
    color:#db4437;
    margin-right:8px;
}

/* Register */

.register{
    text-align:center;
    margin-top:20px;
    color:#555;
}

.register a{
    text-decoration:none;
    color:#0b4db8;
    font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

    <div class="logo">
        <i class="fa-solid fa-scale-balanced"></i>
    </div>

    <div class="title">Let's Learn Constitution</div>
    <div class="subtitle">Learn | Understand | Test</div>

    <h2>Welcome Back!</h2>

    <p class="small">
        Login to continue your learning journey.
    </p>

    <form>

        <label>Email or Username</label>

        <div class="input-box">
            <i class="fa-regular fa-user"></i>
            <input type="text"
            placeholder="Enter your email or username">
        </div>

        <label>Password</label>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password"
            placeholder="Enter your password">
            <i class="fa-regular fa-eye"></i>
        </div>

        <div class="options">
            <label>
                <input type="checkbox">
                Remember me
            </label>

            <a href="#">Forgot Password?</a>
        </div>

        <button class="login-btn" type="submit">
            <i class="fa-solid fa-right-to-bracket"></i>
            Login
        </button>

        <div class="divider">OR</div>

        <button class="google-btn" type="button">
            <i class="fa-brands fa-google"></i>
            Login with Google
        </button>

        <div class="register">
            Don't have an account?
            <a href="#">Register here</a>
        </div>

    </form>

</div>

</div>

</body>
</html>
