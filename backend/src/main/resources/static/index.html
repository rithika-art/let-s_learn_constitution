<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Platform</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
}

.container{
    text-align:center;
    background:white;
    padding:50px;
    border-radius:15px;
    width:500px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.logo{
    font-size:70px;
    color:#2563eb;
    margin-bottom:20px;
}

h1{
    color:#1e3a8a;
    margin-bottom:10px;
}

p{
    color:#555;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    padding:12px 25px;
    margin:10px;
    text-decoration:none;
    color:white;
    background:#2563eb;
    border-radius:8px;
    font-weight:bold;
}

.btn:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <i class="fa-solid fa-graduation-cap"></i>
    </div>

    <h1>Learning Management System</h1>

    <p>
        Learn, Track Progress, Attend Quizzes and Improve Skills.
    </p>

    <a href="login.html" class="btn">
        Login
    </a>

    <a href="register.html" class="btn">
        Register
    </a>

</div>

</body>
</html>
