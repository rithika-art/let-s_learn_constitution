<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's Learn Constitution - Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#eef4ff,#dfefff);
}

.container{
    width:100%;
    max-width:500px;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,0.12);
}

.logo{
    text-align:center;
    margin-bottom:15px;
}

.logo i{
    font-size:70px;
    color:#0b4db8;
}

.title{
    text-align:center;
    color:#0b2d6b;
    font-size:30px;
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-top:8px;
    margin-bottom:30px;
}

h2{
    text-align:center;
    color:#0b2d6b;
    margin-bottom:8px;
}

.small{
    text-align:center;
    color:#777;
    margin-bottom:25px;
}

label{
    display:block;
    margin-bottom:8px;
    margin-top:15px;
    font-weight:600;
    color:#333;
}

.input-box{
    display:flex;
    align-items:center;
    border:1px solid #d7d7d7;
    border-radius:10px;
    padding:12px;
}

.input-box i{
    color:#666;
}

.input-box input{
    width:100%;
    border:none;
    outline:none;
    padding-left:10px;
    font-size:15px;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:15px;
    font-size:14px;
}

.options a{
    text-decoration:none;
    color:#0b4db8;
    font-weight:600;
}

.login-btn{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#0b4db8;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.login-btn:hover{
    background:#083c8f;
}

.divider{
    text-align:center;
    margin:20px 0;
    color:#777;
}

.google-btn{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    background:white;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
}

.google-btn i{
    color:#db4437;
    margin-right:8px;
}

.register{
    text-align:center;
    margin-top:20px;
}

.register a{
    color:#0b4db8;
    text-decoration:none;
    font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

    <div class="logo">
        <i class="fa-solid fa-scale-balanced"></i>
    </div>

    <div class="title">Let's Learn Constitution</div>
    <div class="subtitle">Learn | Understand | Test</div>

    <h2>Welcome Back!</h2>

    <p class="small">
        Login to continue your learning journey.
    </p>

    <form id="loginForm">

        <label>Email or Username</label>

        <div class="input-box">
            <i class="fa-regular fa-user"></i>
            <input type="text"
       id="email"
       placeholder="Enter your email"
       required>
        </div>

        <label>Password</label>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
           <input type="password"
       id="password"
       placeholder="Enter your password"
       required>
        </div>

        <div class="options">
            <label>
                <input type="checkbox">
                Remember me
            </label>

            <a href="#">Forgot Password?</a>
        </div>

        <button class="login-btn"
        type="button"
        onclick="loginUser()">
            <i class="fa-solid fa-right-to-bracket"></i>
            Login
        </button>

    </form>

    <div class="divider">OR</div>

    <button class="google-btn" type="button">
        <i class="fa-brands fa-google"></i>
        Login with Google
    </button>

    <div class="register">
        Don't have an account?
        <a href="register.html">Register here</a>
    </div>

</div>

</div>
<script src="javascript/login.js"></script>
</body>
</html>
